<svg xmlns="http://www.w3.org/2000/svg" width="900" height="160" viewBox="0 0 900 160">
  <defs>
    <style>
      @keyframes revealLTR {
        0%  { clip-path: inset(0 100% 0 0); opacity:1; }
        100%{ clip-path: inset(0 0% 0 0);   opacity:1; }
      }
      @keyframes lineOut {
        0%  { stroke-dashoffset: 760; }
        100%{ stroke-dashoffset: 0; }
      }
      @keyframes roleIn {
        0%  { clip-path: inset(0 100% 0 0); opacity:1; }
        100%{ clip-path: inset(0 0% 0 0);   opacity:1; }
      }
      @keyframes sideBar {
        0%  { transform:scaleY(0); opacity:0; }
        100%{ transform:scaleY(1); opacity:1; }
      }
      @keyframes bktIn {
        0%  { opacity:0; stroke-dashoffset:120; }
        100%{ opacity:1; stroke-dashoffset:0;   }
      }
      @keyframes cursorBlink {
        0%,49%{ opacity:1; } 50%,99%{ opacity:0; }
      }
      @keyframes gridPulse {
        0%,100%{ opacity:1; } 50%{ opacity:0.6; }
      }
      @keyframes sweep {
        0%  { transform:translateY(0);     opacity:0.4; }
        100%{ transform:translateY(160px); opacity:0;   }
      }
      @keyframes fadeIn {
        0%  { opacity:0; } 100%{ opacity:1; }
      }

      .name-reveal  { clip-path:inset(0 100% 0 0); animation: revealLTR 1.2s cubic-bezier(0.77,0,0.18,1) 0.2s both; }
      .underline-path{ stroke-dasharray:760; stroke-dashoffset:760; animation: lineOut 0.6s ease 1.5s both; }
      .role-reveal  { clip-path:inset(0 100% 0 0); animation: roleIn 0.9s cubic-bezier(0.77,0,0.18,1) 1.6s both; }
      .cursor       { animation: cursorBlink 1.1s step-end 2.5s infinite; opacity:0; }
      .side-l       { transform-origin: center top; animation: sideBar 0.4s ease 0.0s both; }
      .side-r       { transform-origin: center top; animation: sideBar 0.4s ease 0.05s both; }
      .bkt-tl       { stroke-dasharray:120; animation: bktIn 0.4s ease 0.00s both; }
      .bkt-tr       { stroke-dasharray:120; animation: bktIn 0.4s ease 0.06s both; }
      .bkt-bl       { stroke-dasharray:120; animation: bktIn 0.4s ease 0.12s both; }
      .bkt-br       { stroke-dasharray:120; animation: bktIn 0.4s ease 0.18s both; }
      .grid-rect    { animation: gridPulse 5s ease-in-out infinite; }
      .sweep        { animation: sweep 4s linear infinite; }
      .dots-fade    { animation: fadeIn 0.4s ease 0.0s both; }
    </style>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="160" fill="#00080f" rx="12"/>

  <!-- Grid -->
  <g class="grid-rect">
    <line x1="0"   y1="20"  x2="900" y2="20"  stroke="rgba(0,210,200,0.06)" stroke-width="0.5"/>
    <line x1="0"   y1="40"  x2="900" y2="40"  stroke="rgba(0,210,200,0.06)" stroke-width="0.5"/>
    <line x1="0"   y1="60"  x2="900" y2="60"  stroke="rgba(0,210,200,0.06)" stroke-width="0.5"/>
    <line x1="0"   y1="80"  x2="900" y2="80"  stroke="rgba(0,210,200,0.06)" stroke-width="0.5"/>
    <line x1="0"   y1="100" x2="900" y2="100" stroke="rgba(0,210,200,0.06)" stroke-width="0.5"/>
    <line x1="0"   y1="120" x2="900" y2="120" stroke="rgba(0,210,200,0.06)" stroke-width="0.5"/>
    <line x1="0"   y1="140" x2="900" y2="140" stroke="rgba(0,210,200,0.06)" stroke-width="0.5"/>
    <line x1="100" y1="0"   x2="100" y2="160" stroke="rgba(0,210,200,0.03)" stroke-width="0.5"/>
    <line x1="200" y1="0"   x2="200" y2="160" stroke="rgba(0,210,200,0.03)" stroke-width="0.5"/>
    <line x1="300" y1="0"   x2="300" y2="160" stroke="rgba(0,210,200,0.03)" stroke-width="0.5"/>
    <line x1="400" y1="0"   x2="400" y2="160" stroke="rgba(0,210,200,0.03)" stroke-width="0.5"/>
    <line x1="500" y1="0"   x2="500" y2="160" stroke="rgba(0,210,200,0.03)" stroke-width="0.5"/>
    <line x1="600" y1="0"   x2="600" y2="160" stroke="rgba(0,210,200,0.03)" stroke-width="0.5"/>
    <line x1="700" y1="0"   x2="700" y2="160" stroke="rgba(0,210,200,0.03)" stroke-width="0.5"/>
    <line x1="800" y1="0"   x2="800" y2="160" stroke="rgba(0,210,200,0.03)" stroke-width="0.5"/>
  </g>

  <!-- Sweep line -->
  <rect class="sweep" x="0" y="0" width="900" height="1.5" fill="rgba(0,210,200,0.25)"/>

  <!-- Side accent bars -->
  <rect class="side-l" x="0"   y="20" width="3" height="120" fill="rgba(0,210,200,0.65)" rx="2"/>
  <rect class="side-r" x="897" y="20" width="3" height="120" fill="rgba(0,210,200,0.65)" rx="2"/>

  <!-- Corner brackets -->
  <polyline class="bkt-tl" points="40,22 14,22 14,48"       fill="none" stroke="rgba(0,210,200,0.55)" stroke-width="1.5" stroke-linecap="square"/>
  <polyline class="bkt-tr" points="860,22 886,22 886,48"    fill="none" stroke="rgba(0,210,200,0.55)" stroke-width="1.5" stroke-linecap="square"/>
  <polyline class="bkt-bl" points="40,138 14,138 14,112"    fill="none" stroke="rgba(0,210,200,0.55)" stroke-width="1.5" stroke-linecap="square"/>
  <polyline class="bkt-br" points="860,138 886,138 886,112" fill="none" stroke="rgba(0,210,200,0.55)" stroke-width="1.5" stroke-linecap="square"/>
  <circle class="dots-fade" cx="14"  cy="22"  r="2" fill="#00d2c8" opacity="0.85"/>
  <circle class="dots-fade" cx="886" cy="22"  r="2" fill="#00d2c8" opacity="0.85"/>
  <circle class="dots-fade" cx="14"  cy="138" r="2" fill="#00d2c8" opacity="0.85"/>
  <circle class="dots-fade" cx="886" cy="138" r="2" fill="#00d2c8" opacity="0.85"/>

  <!-- Name — left to right reveal -->
  <g filter="url(#glow)">
    <text class="name-reveal" x="450" y="82" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="64" font-weight="700"
          fill="#00d2c8" letter-spacing="10">SHEHBAZ KARIM</text>
  </g>

  <!-- Underline -->
  <line class="underline-path" x1="70" y1="94" x2="830" y2="94" stroke="#00d2c8" stroke-width="1.5" stroke-linecap="round"/>
  <line class="underline-path" x1="70" y1="97" x2="830" y2="97" stroke="rgba(0,210,200,0.2)" stroke-width="1" stroke-linecap="round"/>

  <!-- Role — left to right reveal after name -->
  <g filter="url(#glowSoft)">
    <text class="role-reveal" x="450" y="128" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="12"
          fill="rgba(0,210,200,0.75)" letter-spacing="2.5">[ AI ENGINEER · AGENTIC AI · ML · GENAI ]</text>
  </g>

  <!-- Cursor blinks after role finishes -->
  <rect class="cursor" x="700" y="116" width="7" height="13" rx="1" fill="#00d2c8"/>
</svg>
