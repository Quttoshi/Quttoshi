<svg xmlns="http://www.w3.org/2000/svg" width="900" height="160" viewBox="0 0 900 160">
  <defs>
    <style>
      @keyframes glitchSlice {
        0%,100%{ clip-path:inset(0 0 100% 0); transform:translateX(0); opacity:0; }
        5%     { clip-path:inset(30% 0 50% 0); transform:translateX(-6px); opacity:1; }
        6%     { clip-path:inset(30% 0 50% 0); transform:translateX(6px);  opacity:1; }
        7%     { clip-path:inset(60% 0 10% 0); transform:translateX(-4px); opacity:1; }
        8%     { clip-path:inset(0 0 0 0);      transform:translateX(0);   opacity:1; }
        92%    { clip-path:inset(0 0 0 0);      transform:translateX(0);   opacity:1; }
        93%    { clip-path:inset(20% 0 60% 0);  transform:translateX(8px); opacity:1; }
        94%    { clip-path:inset(20% 0 60% 0);  transform:translateX(-8px);opacity:1; }
        95%    { clip-path:inset(0 0 0 0);      transform:translateX(0);   opacity:1; }
      }
      @keyframes chromaR {
        0%,4%,96%,100%{ opacity:0; transform:translateX(0); }
        5%,95%{ opacity:0.4; transform:translateX(5px); }
        8%,92%{ opacity:0; transform:translateX(0); }
      }
      @keyframes chromaB {
        0%,4%,96%,100%{ opacity:0; transform:translateX(0); }
        5%,95%{ opacity:0.35; transform:translateX(-5px); }
        8%,92%{ opacity:0; transform:translateX(0); }
      }
      @keyframes assemble {
        0%  { opacity:0; letter-spacing:80px; filter:blur(12px); }
        40% { opacity:0.6; letter-spacing:20px; filter:blur(4px); }
        70% { opacity:1; letter-spacing:12px; filter:blur(1px); }
        100%{ opacity:1; letter-spacing:10px; filter:blur(0); }
      }
      @keyframes lineOut {
        0%  { stroke-dashoffset: 760; }
        100%{ stroke-dashoffset: 0; }
      }
      @keyframes pFloat1 { 0%,100%{cy:148;opacity:0.7} 50%{cy:142;opacity:1} }
      @keyframes pFloat2 { 0%,100%{cy:152;opacity:0.4} 50%{cy:145;opacity:0.9} }
      @keyframes pFloat3 { 0%,100%{cy:146;opacity:0.6} 50%{cy:140;opacity:1} }
      @keyframes pPop { 0%{r:0;opacity:0} 30%{r:3;opacity:1} 100%{r:2;opacity:0.7} }
      @keyframes roleIn {
        0%  { opacity:0; transform:translateY(14px); letter-spacing:8px; }
        100%{ opacity:1; transform:translateY(0); letter-spacing:2.5px; }
      }
      @keyframes sweep {
        0%  { transform:translateY(0);     opacity:0.5; }
        100%{ transform:translateY(160px); opacity:0;   }
      }
      @keyframes gridPulse {
        0%,100%{ opacity:0.025; } 50%{ opacity:0.06; }
      }
      @keyframes sideBar {
        0%  { transform:scaleY(0); opacity:0; }
        100%{ transform:scaleY(1); opacity:1; }
      }
      @keyframes bktIn {
        0%  { opacity:0; stroke-dashoffset:120; }
        100%{ opacity:1; stroke-dashoffset:0;   }
      }
      @keyframes cursorBlink {
        0%,49%{ opacity:1; } 50%,99%{ opacity:0; }
      }
      @keyframes dataStream {
        0%  { transform:translateY(-20px); opacity:0; }
        10% { opacity:0.6; }
        90% { opacity:0.6; }
        100%{ transform:translateY(180px); opacity:0; }
      }
      .glitch-main   { animation: glitchSlice 8s ease-in-out 0.8s infinite; }
      .chroma-r      { fill:#ff6a00; animation: chromaR 8s ease-in-out 0.8s infinite; }
      .chroma-b      { fill:#ff0044; animation: chromaB 8s ease-in-out 0.8s infinite; }
      .name-assemble { animation: assemble 1.1s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
      .underline-path{ stroke-dasharray:760; stroke-dashoffset:760; animation: lineOut 0.7s ease 1.2s both; }
      .role-text     { animation: roleIn 0.6s cubic-bezier(0.16,1,0.3,1) 1.5s both; opacity:0; }
      .cursor        { animation: cursorBlink 1.1s step-end 1.5s infinite; opacity:0; }
      .sweep         { animation: sweep 3s linear infinite; }
      .grid-rect     { animation: gridPulse 4s ease-in-out infinite; }
      .side-l        { transform-origin: center top; animation: sideBar 0.5s ease 0.05s both; }
      .side-r        { transform-origin: center top; animation: sideBar 0.5s ease 0.10s both; }
      .bkt-tl        { stroke-dasharray:120; animation: bktIn 0.5s ease 0.00s both; }
      .bkt-tr        { stroke-dasharray:120; animation: bktIn 0.5s ease 0.08s both; }
      .bkt-bl        { stroke-dasharray:120; animation: bktIn 0.5s ease 0.15s both; }
      .bkt-br        { stroke-dasharray:120; animation: bktIn 0.5s ease 0.22s both; }
      .p1{ animation: pPop 0.4s ease 1.22s both, pFloat1 2.8s ease-in-out 1.62s infinite; }
      .p2{ animation: pPop 0.4s ease 1.28s both, pFloat2 3.2s ease-in-out 1.68s infinite; }
      .p3{ animation: pPop 0.4s ease 1.34s both, pFloat3 2.5s ease-in-out 1.74s infinite; }
      .p4{ animation: pPop 0.4s ease 1.40s both, pFloat2 3.6s ease-in-out 1.80s infinite; }
      .p5{ animation: pPop 0.4s ease 1.46s both, pFloat1 2.2s ease-in-out 1.86s infinite; }
      .p6{ animation: pPop 0.4s ease 1.52s both, pFloat3 3.0s ease-in-out 1.92s infinite; }
      .ds1{ animation: dataStream 4.2s linear 0.3s infinite; }
      .ds2{ animation: dataStream 5.1s linear 1.1s infinite; }
      .ds3{ animation: dataStream 3.8s linear 2.0s infinite; }
      .ds4{ animation: dataStream 6.0s linear 0.7s infinite; }
    </style>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background — deep charcoal with warm undertone -->
  <rect width="900" height="160" fill="#0d0800" rx="12"/>

  <!-- Grid -->
  <g class="grid-rect">
    <line x1="0" y1="20"  x2="900" y2="20"  stroke="rgba(251,146,60,0.07)" stroke-width="0.5"/>
    <line x1="0" y1="40"  x2="900" y2="40"  stroke="rgba(251,146,60,0.07)" stroke-width="0.5"/>
    <line x1="0" y1="60"  x2="900" y2="60"  stroke="rgba(251,146,60,0.07)" stroke-width="0.5"/>
    <line x1="0" y1="80"  x2="900" y2="80"  stroke="rgba(251,146,60,0.07)" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="900" y2="100" stroke="rgba(251,146,60,0.07)" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="rgba(251,146,60,0.07)" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="900" y2="140" stroke="rgba(251,146,60,0.07)" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="160" stroke="rgba(251,146,60,0.04)" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="160" stroke="rgba(251,146,60,0.04)" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="160" stroke="rgba(251,146,60,0.04)" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="160" stroke="rgba(251,146,60,0.04)" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="160" stroke="rgba(251,146,60,0.04)" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="160" stroke="rgba(251,146,60,0.04)" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="160" stroke="rgba(251,146,60,0.04)" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="160" stroke="rgba(251,146,60,0.04)" stroke-width="0.5"/>
  </g>

  <!-- Binary data streams -->
  <text class="ds1" x="48"  y="0" font-family="monospace" font-size="9" fill="rgba(251,146,60,0.28)">10110</text>
  <text class="ds2" x="852" y="0" font-family="monospace" font-size="9" fill="rgba(251,146,60,0.22)">01001</text>
  <text class="ds3" x="30"  y="0" font-family="monospace" font-size="8" fill="rgba(251,146,60,0.18)">11010</text>
  <text class="ds4" x="866" y="0" font-family="monospace" font-size="8" fill="rgba(251,146,60,0.24)">00111</text>

  <!-- Side accent bars -->
  <rect class="side-l" x="0"   y="20" width="3" height="120" fill="rgba(251,146,60,0.7)" rx="2"/>
  <rect class="side-r" x="897" y="20" width="3" height="120" fill="rgba(251,146,60,0.7)" rx="2"/>

  <!-- Corner brackets -->
  <polyline class="bkt-tl" points="40,22 14,22 14,48"      fill="none" stroke="rgba(251,146,60,0.6)" stroke-width="1.5" stroke-linecap="square"/>
  <polyline class="bkt-tr" points="860,22 886,22 886,48"   fill="none" stroke="rgba(251,146,60,0.6)" stroke-width="1.5" stroke-linecap="square"/>
  <polyline class="bkt-bl" points="40,138 14,138 14,112"   fill="none" stroke="rgba(251,146,60,0.6)" stroke-width="1.5" stroke-linecap="square"/>
  <polyline class="bkt-br" points="860,138 886,138 886,112" fill="none" stroke="rgba(251,146,60,0.6)" stroke-width="1.5" stroke-linecap="square"/>
  <circle cx="14"  cy="22"  r="2" fill="#fb923c" opacity="0.8"/>
  <circle cx="886" cy="22"  r="2" fill="#fb923c" opacity="0.8"/>
  <circle cx="14"  cy="138" r="2" fill="#fb923c" opacity="0.8"/>
  <circle cx="886" cy="138" r="2" fill="#fb923c" opacity="0.8"/>

  <!-- Sweep line -->
  <rect class="sweep" x="0" y="0" width="900" height="1.5" fill="rgba(251,146,60,0.3)"/>

  <!-- Chromatic aberration ghosts — orange + red split -->
  <text class="chroma-r" x="450" y="88" text-anchor="middle"
        font-family="'Courier New',Courier,monospace" font-size="64" font-weight="700" letter-spacing="10">SHEHBAZ KARIM</text>
  <text class="chroma-b" x="450" y="88" text-anchor="middle"
        font-family="'Courier New',Courier,monospace" font-size="64" font-weight="700" letter-spacing="10">SHEHBAZ KARIM</text>

  <!-- Main name — warm amber/gold -->
  <g filter="url(#glow)">
    <text class="name-assemble glitch-main" x="450" y="88" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="64" font-weight="700"
          fill="#fcd34d" letter-spacing="10">SHEHBAZ KARIM</text>
  </g>

  <!-- Underline — orange burn -->
  <line class="underline-path" x1="70" y1="100" x2="830" y2="100" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round"/>
  <line class="underline-path" x1="70" y1="103" x2="830" y2="103" stroke="rgba(251,146,60,0.2)" stroke-width="1" stroke-linecap="round"/>

  <!-- Floating particles -->
  <circle class="p1" cx="200" cy="148" r="2"   fill="#fb923c"/>
  <circle class="p2" cx="330" cy="152" r="1.5" fill="#fcd34d"/>
  <circle class="p3" cx="450" cy="146" r="2"   fill="#fb923c"/>
  <circle class="p4" cx="570" cy="150" r="1.5" fill="#fed7aa"/>
  <circle class="p5" cx="680" cy="148" r="2"   fill="#fb923c"/>
  <circle class="p6" cx="760" cy="145" r="1.5" fill="#fcd34d"/>

  <!-- Role subtitle -->
  <g filter="url(#glowSoft)">
    <text class="role-text" x="450" y="130" text-anchor="middle"
          font-family="'Courier New',Courier,monospace" font-size="12"
          fill="rgba(253,211,77,0.75)" letter-spacing="2.5">[ AI ENGINEER · AGENTIC AI · ML · GENAI ]</text>
  </g>

  <!-- Cursor -->
  <rect class="cursor" x="700" y="118" width="7" height="13" rx="1" fill="#fb923c"/>
</svg>
