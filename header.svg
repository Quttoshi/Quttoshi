<svg xmlns="http://www.w3.org/2000/svg" width="800" height="130" viewBox="0 0 800 130">
  <defs>
    <style>
      @keyframes scanline { 0%{y:0;opacity:0.5} 100%{y:130;opacity:0} }
      @keyframes blink { 0%,49%{opacity:1} 50%,99%{opacity:0} }
      @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.7} 94%{opacity:1} 97%{opacity:0.85} 98%{opacity:1} }
      @keyframes charIn0 { 0%{opacity:0;transform:translateY(-18px)} 100%{opacity:1;transform:translateY(0)} }
      @keyframes charIn1 { 0%{opacity:0;transform:translateY(-18px)} 100%{opacity:1;transform:translateY(0)} }
      @keyframes barIn { 0%{width:0} 100%{width:760px} }
      @keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }

      rect.bg { fill: #07050f; }
      rect.grid-h { fill: rgba(167,139,250,0.06); }

      .name { font-family: monospace; font-size: 66px; font-weight: 700; fill: #a78bfa; letter-spacing: 10px; animation: flicker 5.5s ease-in-out infinite; }
      .c1 { animation: charIn0 0.35s cubic-bezier(0.22,1,0.36,1) 0.04s both; }
      .c2 { animation: charIn0 0.35s cubic-bezier(0.22,1,0.36,1) 0.10s both; }
      .c3 { animation: charIn0 0.35s cubic-bezier(0.22,1,0.36,1) 0.16s both; }
      .c4 { animation: charIn0 0.35s cubic-bezier(0.22,1,0.36,1) 0.22s both; }
      .c5 { animation: charIn0 0.35s cubic-bezier(0.22,1,0.36,1) 0.28s both; }
      .c6 { animation: charIn0 0.35s cubic-bezier(0.22,1,0.36,1) 0.34s both; }
      .c7 { animation: charIn0 0.35s cubic-bezier(0.22,1,0.36,1) 0.40s both; }

      .bar1 { fill: #a78bfa; animation: barIn 0.55s ease 0.6s both; width: 0; }
      .bar2 { fill: rgba(167,139,250,0.2); animation: barIn 0.55s ease 0.75s both; width: 0; }
      .subtitle { animation: fadeIn 0.5s ease 0.95s both; opacity: 0; }
      .cursor { fill: #a78bfa; animation: blink 1.1s step-end infinite; }
      .scan { fill: rgba(167,139,250,0.18); animation: scanline 3.2s linear infinite; }
    </style>
  </defs>

  <rect width="800" height="130" fill="#07050f" rx="10"/>

  <line x1="0" y1="0" x2="800" y2="0" stroke="rgba(167,139,250,0.06)" stroke-width="38"/>
  <line x1="0" y1="38" x2="800" y2="38" stroke="rgba(167,139,250,0.06)" stroke-width="38"/>
  <line x1="0" y1="76" x2="800" y2="76" stroke="rgba(167,139,250,0.06)" stroke-width="38"/>
  <line x1="0" y1="114" x2="800" y2="114" stroke="rgba(167,139,250,0.06)" stroke-width="38"/>

  <rect class="scan" x="0" width="800" height="2" y="0"/>

  <text y="78" font-family="monospace" font-size="66" font-weight="700" fill="#a78bfa" letter-spacing="10" style="animation: flicker 5.5s ease-in-out infinite;">
    <tspan class="c1" dx="20">S</tspan><tspan class="c2">H</tspan><tspan class="c3">E</tspan><tspan class="c4">H</tspan><tspan class="c5">B</tspan><tspan class="c6">A</tspan><tspan class="c7">Z</tspan>
  </text>

  <rect class="bar1" x="20" y="88" height="2" rx="1"/>
  <rect class="bar2" x="20" y="91" height="1" rx="0"/>

  <g class="subtitle">
    <text x="20" y="115" font-family="monospace" font-size="12" fill="rgba(167,139,250,0.35)">[</text>
    <text x="34" y="115" font-family="monospace" font-size="12" fill="rgba(167,139,250,0.75)" letter-spacing="2">ASSOCIATE SOFTWARE ENGINEER · AGENTIC AI · ML · GENAI</text>
    <rect class="cursor" x="686" y="103" width="9" height="14" rx="1"/>
    <text x="698" y="115" font-family="monospace" font-size="12" fill="rgba(167,139,250,0.35)">]</text>
  </g>
</svg>
